extends: base.yaml

verification:
  labels:
    - "pants-fire"
    - "false"
    - "barely-true"
    - "half-true"
    - "mostly-true"
    - "true"
  label_descriptions:
    "pants-fire": completely false or absurd
    "false": factually false
    "barely-true": contains a small amount of truth but is mostly false
    "half-true": partially true and partially false or missing important context
    "mostly-true": largely true with minor inaccuracies or omissions
    "true": factually true according to the provided evidence

models:
  kg_llm:
    backend: local_vllm
    api_key: ""
    api_base: ""
    model: gemma-4-31b-it
    local_model_path: /data/models/gemma-4-31B-it
    local_tensor_parallel_size: 4
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    temperature: 0.0
    top_p: 1.0
    max_tokens: 8192
    response_format:
      type: json_object

  reasoning_llm:
    backend: local_vllm
    api_key: ""
    api_base: ""
    model: gemma-4-31b-it
    local_model_path: /data/models/gemma-4-31B-it
    local_tensor_parallel_size: 4
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    temperature: 0.0
    top_p: 1.0
    max_tokens: 8192