run:
  mode: full
  seed: 42
  limit: null
  num_workers: 1
  batch_size: 8
  verbose: true
  show_sample_stage_progress: true
  debug: false
  debug_preview_chars: 1200
  debug_head_chars: 450
  debug_tail_chars: 450

data:
  input_path: ./data/example_input.jsonl
  output_path: ./outputs/predictions.jsonl
  id_field: id
  claim_field: claim
  reports_field: reports
  label_field: label

cache:
  enabled: true
  cache_dir: ./cache

models:
  kg_llm:
    backend: openai_compatible
    api_key: ${KG_API_KEY}
    api_base: ${KG_API_BASE}
    model: ${KG_MODEL}
    local_model_path: ""
    local_tensor_parallel_size: 1
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    local_trust_remote_code: true
    timeout: 120
    temperature: 0.0
    max_tokens: 8192
    top_p: 1.0
    max_retries: 3
    retry_wait_seconds: 2.0
    headers: {}
    response_format:
      type: json_object
    extra_body: {}

  reasoning_llm:
    backend: openai_compatible
    api_key: ${REASONING_API_KEY}
    api_base: ${REASONING_API_BASE}
    model: ${REASONING_MODEL}
    local_model_path: ""
    local_tensor_parallel_size: 1
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    local_trust_remote_code: true
    timeout: 120
    temperature: 0.0
    max_tokens: 8192
    top_p: 1.0
    max_retries: 3
    retry_wait_seconds: 2.0
    headers: {}
    response_format: null
    extra_body: {}

embedding:
  model_path: /data/models/Qwen3-Embedding-0.6B
  device: cuda
  batch_size: 32
  normalize: true

pipeline:
  max_contrastive_questions: 5
  mmr_lambda: 1.0
  max_context_chars_for_answers: 24000
  max_context_chars_for_verification: 20000
  deduplicate_questions: true
  save_raw_api_responses: true
  merge_entity_strategy: normalized_name
  question_generation_mode: kg

verification:
  labels: []
  label_descriptions: {}

prompts:
  use_operationalized_kg_prompt: true
  llm_question_examples: []
