extends: base.yaml

run:
  # 仅示例：建议配合 batch_size > 1，以触发本地 vLLM 的 LLM.generate([prompt1, ...]) 批量推理。
  batch_size: 4

models:
  kg_llm:
    backend: local_vllm
    api_key: ""
    api_base: ""
    model: gemma-4-31b-it
    local_model_path: /data/models/gemma-4-31B-it
    local_tensor_parallel_size: 4
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    temperature: 0.0
    top_p: 1.0
    max_tokens: 8192
    response_format:
      type: json_object

  reasoning_llm:
    backend: local_vllm
    api_key: ""
    api_base: ""
    model: gemma-4-31b-it
    local_model_path: /data/models/gemma-4-31B-it
    local_tensor_parallel_size: 4
    local_dtype: bfloat16
    local_max_model_len: 16384
    local_gpu_memory_utilization: 0.9
    local_max_num_batched_tokens: 16384
    local_max_num_seqs: 16
    local_async_scheduling: true
    temperature: 0.0
    top_p: 1.0
    max_tokens: 8192
